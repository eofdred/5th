<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scopus Review Paper Fetcher</title>
    <style>
        :root {
            --background: #09090b;
            --foreground: #f8fafc;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --panel: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            background-color: var(--background);
            color: var(--foreground);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(to right, #8b5cf6, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-family: monospace;
            font-size: 1rem;
            min-height: 100px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-success {
            background-color: #10b981;
            color: white;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        .btn-success:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats-panel {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #94a3b8;
        }

        .stat-value {
            font-weight: 600;
            color: #38bdf8;
            font-size: 1.1rem;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 16px;
            height: 16px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #errorAlert {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .app-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .home-link:hover {
            color: #f8fafc;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

    <div class="container">
        <div class="app-header">
            <a href="../../index.html" class="home-link">← Back to Home</a>
            <img src="app_icon.png" alt="Scopus Review Engine Logo" class="app-logo">
            <h1>Scopus Review Engine</h1>
        </div>
        <p class="description">Fetch research papers instantly, automatically filter out non-primary research, fetch
            abstracts, and export to CSV.</p>

        <div class="form-group">
            <label for="searchQuery">Database Search Query:</label>
            <textarea id="searchQuery"
                placeholder="e.g. pain AND (indicator OR assessment) AND (ruminant OR cattle OR sheep)">"behavior change" AND "biosecurity"</textarea>

            <div class="checkbox-group"
                style="margin-top: 1rem; display: flex; gap: 1.5rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; border: 1px solid var(--border);">
                <label
                    style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: #f8fafc; font-weight: normal; margin: 0;">
                    <input type="checkbox" id="searchTitle" checked
                        style="width: 1.2rem; height: 1.2rem; accent-color: var(--primary);">
                    Search in Title
                </label>
                <label
                    style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: #f8fafc; font-weight: normal; margin: 0;">
                    <input type="checkbox" id="searchAbstract" checked
                        style="width: 1.2rem; height: 1.2rem; accent-color: var(--primary);">
                    Search in Abstract
                </label>
            </div>
        </div>

        <div id="errorAlert"></div>

        <div class="actions">
            <button id="btnSearch" class="btn-primary" onclick="runSearch()">
                <div class="loader" id="searchLoader"></div>
                <span>Search</span>
            </button>
            <button id="btnDownloadCSV" class="btn-success" onclick="downloadCSV()" disabled>
                <span>Download CSV</span>
            </button>
            <button id="btnDownloadXLSX" class="btn-secondary" onclick="downloadXLSX()" disabled>
                <span>Download XLSX</span>
            </button>
        </div>

        <div class="stats-panel">
            <div class="stat-row">
                <span class="stat-label">Raw Papers Found:</span>
                <span class="stat-value" id="statRaw">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Duplicates & Non-Research Removed:</span>
                <span class="stat-value" id="statDupes" style="color: #ef4444;">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label" style="color: #f8fafc;">Final Valid Research Papers:</span>
                <span class="stat-value" id="statUnique" style="color: #10b981;">0</span>
            </div>
        </div>
    </div>

    <script>
        let globalPapers = []; // Array of {title, doi, year, source, type, uid, abstract}
        let uniquePapers = [];

        async function runSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            const searchTitle = document.getElementById('searchTitle').checked;
            const searchAbstract = document.getElementById('searchAbstract').checked;

            const errorBox = document.getElementById('errorAlert');
            const loader = document.getElementById('searchLoader');
            const btn = document.getElementById('btnSearch');

            if (!query) {
                showError("Please enter a search query.");
                return;
            }
            if (!searchTitle && !searchAbstract) {
                showError("Please select at least one field (Title or Abstract) to search in.");
                return;
            }

            // Reset UI
            errorBox.style.display = 'none';
            btn.disabled = true;
            loader.style.display = 'block';
            document.getElementById('btnDownloadCSV').disabled = true;
            document.getElementById('btnDownloadXLSX').disabled = true;

            globalPapers = [];
            uniquePapers = [];
            updateStats(0, 0, 0);

            try {
                const scopusResults = await fetchScopus(query);

                // Post-filter: validate each paper actually contains the query terms
                const filteredScopus = scopusResults.filter(p => matchesQuery(query, searchTitle, searchAbstract, p));

                globalPapers = filteredScopus;

                const seenTitles = new Set();
                const seenDois = new Set();
                uniquePapers = [];

                for (const p of globalPapers) {
                    const cleanTitle = p.title.trim().toLowerCase();
                    const doi = p.doi.trim();

                    // Only keep Original Research Papers
                    if (p.type !== 'Research Paper') {
                        continue;
                    }

                    // Deduplicate
                    if ((doi && seenDois.has(doi)) || (cleanTitle && seenTitles.has(cleanTitle))) {
                        continue;
                    }

                    uniquePapers.push(p);
                    if (doi) seenDois.add(doi);
                    if (cleanTitle) seenTitles.add(cleanTitle);
                }

                const itemsRemoved = globalPapers.length - uniquePapers.length;

                updateStats(globalPapers.length, itemsRemoved, uniquePapers.length);

                if (uniquePapers.length > 0) {
                    document.getElementById('btnDownloadCSV').disabled = false;
                    document.getElementById('btnDownloadXLSX').disabled = false;
                }

            } catch (err) {
                showError("Search failed: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        /**
         * Client-side Boolean query validator.
         * Safely evaluates complex AND/OR/NOT boolean queries using a JS parser.
         */
        function matchesQuery(query, searchTitle, searchAbstract, paper) {
            let text = '';
            if (searchTitle) text += ' ' + paper.title.toLowerCase();
            if (searchAbstract) text += ' ' + (paper.abstract || '').toLowerCase();
            
            return evaluateBoolean(query, text);
        }

        function evaluateBoolean(query, text) {
            let q = query.replace(/\(/g, ' ( ').replace(/\)/g, ' ) ');
            const regex = /"([^"]+)"|([^\s()]+)|\(|\)/g;
            let match;
            let jsExpr = '';
            
            while ((match = regex.exec(q)) !== null) {
                if (match[0] === '(' || match[0] === ')') {
                    jsExpr += match[0] + ' ';
                } else if (match[0].toUpperCase() === 'AND') {
                    jsExpr += '&& ';
                } else if (match[0].toUpperCase() === 'OR') {
                    jsExpr += '|| ';
                } else if (match[0].toUpperCase() === 'NOT') {
                    jsExpr += '! ';
                } else {
                    let term = (match[1] || match[2]).toLowerCase();
                    let escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    let test = new RegExp(`\\b${escaped}\\b`, 'i').test(text);
                    jsExpr += test + ' ';
                }
            }
            
            try {
                return Function(`"use strict"; return (${jsExpr});`)();
            } catch (e) {
                console.warn("Could not evaluate query client-side, defaulting to true", query, e);
                return true; 
            }
        }

        async function fetchScopus(query) {
            let records = [];

            const searchTitle = document.getElementById('searchTitle').checked;
            const searchAbstract = document.getElementById('searchAbstract').checked;

            let scopusQuery = '';
            if (searchTitle && searchAbstract) {
                scopusQuery = `TITLE-ABS-KEY(${query})`;
            } else if (searchTitle) {
                scopusQuery = `TITLE(${query})`;
            } else if (searchAbstract) {
                scopusQuery = `ABS(${query})`;
            } else {
                scopusQuery = query;
            }

            const apiKey = "d5ab23e213d36b6d6ed306463072e475";
            let start = 0;
            const count = 25;
            const maxResults = 200;

            while (start < maxResults) {
                const url = `https://api.elsevier.com/content/search/scopus?query=${encodeURIComponent(scopusQuery)}&apiKey=${apiKey}&view=COMPLETE&count=${count}&start=${start}&sort=-coverDate`;

                const response = await fetch(url, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Scopus API error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                const entries = data['search-results']?.entry || [];
                if (entries.length === 0) {
                    break;
                }

                for (const article of entries) {
                    let title = article['dc:title'] || '';
                    title = title.replace(/<[^>]*>?/gm, ''); // strip HTML tags

                    let doi = article['prism:doi'] || '';
                    let coverDate = article['prism:coverDate'] || '';
                    let year = coverDate ? coverDate.split('-')[0] : '';

                    let subType = article['subtypeDescription'] || '';
                    let type = 'Other';
                    if (subType.toLowerCase().includes('review')) {
                        type = 'Review';
                    } else if (subType.toLowerCase().includes('article') || subType.toLowerCase().includes('conference paper') || subType.toLowerCase().includes('cp')) {
                        type = 'Research Paper';
                    }

                    let abstract = article['dc:description'] || '';

                    if (title) {
                        records.push({
                            title,
                            doi,
                            year,
                            source: 'Scopus',
                            type,
                            uid: article['dc:identifier'] || '',
                            abstract
                        });
                    }
                }

                start += count;
                await new Promise(r => setTimeout(r, 100)); // Sleep brief moment to respect rate limits
            }
            return records;
        }

        function downloadCSV() {
            if (uniquePapers.length === 0) return;

            // Prepare CSV Header with newly added columns
            let csvContent = "\uFEFFtitle,doi,year,type,abstract\n";

            uniquePapers.forEach(p => {
                // Escape quotes inside fields securely
                const safeTitle = p.title.replace(/"/g, '""');
                const safeType = (p.type || '').replace(/"/g, '""');
                const safeAbstract = (p.abstract || '').replace(/"/g, '""');

                csvContent += `"${safeTitle}","${p.doi}","${p.year}","${safeType}","${safeAbstract}"\n`;
            });

            // Create Blob and trigger download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "scopus_review_results.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadXLSX() {
            if (uniquePapers.length === 0) return;
            if (typeof XLSX === 'undefined') {
                showError("XLSX library not loaded yet. Please try again in a moment.");
                return;
            }

            const data = uniquePapers.map(p => ({
                Title: p.title,
                DOI: p.doi,
                Year: p.year,
                Type: p.type,
                Abstract: p.abstract
            }));

            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Papers");
            XLSX.writeFile(workbook, "scopus_review_results.xlsx");
        }

        function updateStats(raw, dupes, unique) {
            document.getElementById('statRaw').innerText = raw;
            document.getElementById('statDupes').innerText = dupes;
            document.getElementById('statUnique').innerText = unique;
        }

        function showError(msg) {
            const box = document.getElementById('errorAlert');
            box.innerText = msg;
            box.style.display = 'block';
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
