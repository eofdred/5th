<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akademik Teşvik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./app_icon.png">
    
    <style>
        :root {
            --bg: #09090b;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand: #6366f1;
            --brand-glow: rgba(99, 102, 241, 0.4);
            --brand-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --success: #22c55e;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
            position: relative;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .score-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(16px);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: var(--brand);
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
        }

        .total-score {
            font-size: 56px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 20px var(--brand-glow);
        }

        .total-score.cap {
            color: var(--success);
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        .score-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            appearance: none;
        }

        select:focus, input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 2px var(--brand-glow);
        }
        
        .hidden {
            display: none;
        }

        .btn {
            width: 100%;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--brand-gradient);
            border: none;
            box-shadow: 0 4px 15px var(--brand-glow);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn:active {
            background: rgba(255,255,255,0.1);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .activity-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .activity-details {
            flex: 1;
        }

        .activity-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .activity-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .activity-score {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand);
            margin-left: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .breakdown-item {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .breakdown-cat { color: var(--text-muted); }
        .breakdown-val { font-weight: 600; justify-self: end;}

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Akademik Teşvik</h1>
        <div class="subtitle">Yönetmelik Güncel Hesaplayıcısı</div>
    </header>

    <div class="score-card">
        <div class="total-score" id="totalScore">0.0</div>
        <div class="score-label">Toplam Puan (Maksimum 100)</div>
    </div>

    <!-- ADD ACTIVITY PANEL -->
    <div class="panel">
        <div class="panel-title">Faaliyet Ekle</div>
        
        <div class="form-group">
            <label>Kategori</label>
            <select id="selCategory" onchange="updateActivityOptions()">
                <option value="" disabled selected>Kategori Seçin...</option>
                <option value="proje">Proje (Maks 20)</option>
                <option value="arastirma">Araştırma (Maks 15)</option>
                <option value="yayin">Yayın (Maks 30)</option>
                <option value="tasarim">Tasarım (Maks 15)</option>
                <option value="patent">Patent (Maks 30)</option>
                <option value="atif">Atıf (Maks 30)</option>
                <option value="teblig">Tebliğ (Maks 20)</option>
                <option value="odul">Ödül (Maks 20)</option>
            </select>
        </div>

        <div class="form-group hidden" id="grpActivity">
            <label>Faaliyet Türü</label>
            <select id="selActivity" onchange="updateDynamicInputs()">
                <!-- Options populated dynamically -->
            </select>
        </div>

        <div class="form-group hidden" id="grpRole">
            <label>Projedeki Rolünüz</label>
            <select id="selRole">
                <option value="1">Yürütücü</option>
                <option value="0.5">Araştırmacı / Bursiyer</option>
            </select>
        </div>

        <div class="form-group hidden" id="grpAuthors">
            <label>Toplam Yazar/Kişi Sayısı</label>
            <input type="number" id="inpAuthors" min="1" max="50" value="1" placeholder="1">
        </div>

        <div class="form-group hidden" id="grpQuartile">
            <label>Dergi Çeyreklik Grubu (Q)</label>
            <select id="selQuartile">
                <option value="1">Q1</option>
                <option value="0.8">Q2</option>
                <option value="0.5">Q3 (veya AHCI)</option>
                <option value="0.25">Q4 (veya belirtilmemiş)</option>
            </select>
        </div>

        <div class="form-group hidden" id="grpMonths">
            <label>Süre (Ay)</label>
            <input type="number" id="inpMonths" min="1" max="100" value="1" placeholder="1">
        </div>

        <button class="btn btn-primary" onclick="addActivity()">Listeye Ekle</button>
    </div>

    <!-- LIST PANEL -->
    <div class="panel">
        <div class="panel-title">Eklenen Faaliyetler</div>
        <div class="activity-list" id="activityList">
            <!-- Activities go here -->
        </div>
        <div class="breakdown" id="breakdownSection">
            <!-- Breakdown goes here -->
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(function() {
            console.log('Service Worker Registered');
        });
    }

    const categoryMax = {
        proje: 20, arastirma: 15, yayin: 30, tasarim: 15, patent: 30, atif: 30, teblig: 20, odul: 20
    };

    const catLabels = {
        proje: "Proje", arastirma: "Araştırma", yayin: "Yayın", tasarim: "Tasarım", 
        patent: "Patent", atif: "Atıf", teblig: "Tebliğ", odul: "Ödül"
    };

    const activityData = [
        { id: 'p1', cat: 'proje', label: 'TÜBİTAK 1001, 1003, 1004, 1007, 1505, 2244, 3501, SAYEM, COST, Uluslararası İkili İşbirliği', reqRole: true, rateFunc: (r) => r * 80 },
        { id: 'p2', cat: 'proje', label: 'TÜBİTAK 1005, 3001', reqRole: true, rateFunc: (r) => r * 70 },
        { id: 'p3', cat: 'proje', label: 'H2020 projesi', reqRole: true, rateFunc: (r) => r * 100 },
        { id: 'p4', cat: 'proje', label: 'Diğer uluslararası Ar-Ge (>= 9 ay)', reqRole: true, rateFunc: (r) => r * 40 },
        { id: 'p5', cat: 'proje', label: 'Diğer ulusal Ar-Ge (>= 9 ay)', reqRole: true, rateFunc: (r) => r * 20 },
        
        { id: 'a1', cat: 'arastirma', label: 'Yurt dışı araştırma', reqMonths: true, rateFunc: (r,k,p,m) => 15 * m },
        { id: 'a2', cat: 'arastirma', label: 'Yurt içi araştırma', reqMonths: true, rateFunc: (r,k,p,m) => 10 * m },

        { id: 'y1', cat: 'yayin', label: 'SCI, SCI-Expanded, SSCI, AHCI Araştırma Makalesi', reqAuthors: true, reqQuartile: true, rateFunc: (r,k,p) => k * p * 60 },
        { id: 'y2', cat: 'yayin', label: 'SCI, SCI-Expanded, SSCI, AHCI Derleme Makale vb.', reqAuthors: true, reqQuartile: true, rateFunc: (r,k,p) => k * p * 30 },
        { id: 'y3', cat: 'yayin', label: 'Alan endeksleri araştırma makalesi', reqAuthors: true, rateFunc: (r,k) => k * 20 },
        { id: 'y4', cat: 'yayin', label: 'Diğer uluslararası hakemli dergi araşt. makalesi', reqAuthors: true, rateFunc: (r,k) => k * 15 },
        { id: 'y5', cat: 'yayin', label: 'ULAKBİM TR Dizin araştırma makalesi', reqAuthors: true, rateFunc: (r,k) => k * 15 },
        { id: 'y6', cat: 'yayin', label: 'SCI, SCI-Expanded, SSCI, AHCI Editörlük', rateFunc: () => 25 },
        { id: 'y7', cat: 'yayin', label: 'Alan endeksleri Editörlük', rateFunc: () => 15 },
        { id: 'y8', cat: 'yayin', label: 'Diğer hakemli dergi Editörlük', rateFunc: () => 10 },
        { id: 'y9', cat: 'yayin', label: 'Tanınmış uluslararası yayınevi özgün bilimsel kitap', reqAuthors: true, rateFunc: (r,k) => k * 100 },
        { id: 'y10', cat: 'yayin', label: 'Tanınmış uluslararası yayınevi kitap editörlüğü', reqAuthors: true, rateFunc: (r,k) => k * 60 },
        { id: 'y11', cat: 'yayin', label: 'Tanınmış uluslararası yayınevi kitapta bölüm yazarlığı', reqAuthors: true, rateFunc: (r,k) => k * 25 },
        { id: 'y12', cat: 'yayin', label: 'Diğer özgün bilimsel kitap', reqAuthors: true, rateFunc: (r,k) => k * 50 },
        { id: 'y13', cat: 'yayin', label: 'Diğer özgün bilimsel kitaplarda bölüm yazarlığı', reqAuthors: true, rateFunc: (r,k) => k * 15 },

        { id: 'ts1', cat: 'tasarim', label: 'Endüstriyel, çevresel, grafiksel veya çalgı tasarımı vb.', rateFunc: () => 15 },

        { id: 'pt1', cat: 'patent', label: 'Uluslararası patent', reqAuthors: true, rateFunc: (r,k) => k * 100 },
        { id: 'pt2', cat: 'patent', label: 'Ulusal patent', reqAuthors: true, rateFunc: (r,k) => k * 60 },

        { id: 'at1', cat: 'atif', label: 'SCI, SCI-Expanded, SSCI, AHCI makalelerde atıf', rateFunc: () => 4 },
        { id: 'at2', cat: 'atif', label: 'Alan endeksleri makalelerde atıf', rateFunc: () => 1.5 },
        { id: 'at3', cat: 'atif', label: 'Diğer uluslararası makalelerde atıf', rateFunc: () => 1 },
        { id: 'at4', cat: 'atif', label: 'ULAKBİM TR Dizin makalelerde atıf', rateFunc: () => 1 },
        { id: 'at5', cat: 'atif', label: 'Tanınmış uluslararası yayınevi kitapta atıf', rateFunc: () => 4 },
        { id: 'at6', cat: 'atif', label: 'Diğer özgün bilimsel kitapta atıf', rateFunc: () => 2 },

        { id: 'tb1', cat: 'teblig', label: 'Uluslararası hakemli kongrede yayımlanan tam bildiri', reqAuthors: true, rateFunc: (r,k) => k * 15 },

        { id: 'o1', cat: 'odul', label: 'YÖK Yılın Doktora Tezi / TÜBİTAK Bilim / TÜBA Akademi Ödülü', rateFunc: () => 100 },
        { id: 'o2', cat: 'odul', label: 'Yurt dışı bilim ödülü', rateFunc: () => 40 },
        { id: 'o3', cat: 'odul', label: 'Yurt içi bilim ödülü', rateFunc: () => 20 }
    ];

    let activities = [];

    function calculateK(n) {
        n = parseInt(n) || 1;
        if (n === 1) return 1;
        if (n === 2) return 0.8;
        if (n === 3) return 0.6;
        if (n === 4) return 0.45;
        if (n === 5) return 0.2;
        if (n === 6) return 1/6;
        return 1/n;
    }

    function updateActivityOptions() {
        const cat = document.getElementById('selCategory').value;
        const selAct = document.getElementById('selActivity');
        selAct.innerHTML = '<option value="" disabled selected>Faaliyet Seçin...</option>';
        
        const filtered = activityData.filter(a => a.cat === cat);
        filtered.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.id;
            opt.textContent = a.label;
            selAct.appendChild(opt);
        });

        document.getElementById('grpActivity').classList.remove('hidden');
        updateDynamicInputs();
    }

    function updateDynamicInputs() {
        const id = document.getElementById('selActivity').value;
        const act = activityData.find(a => a.id === id);

        document.getElementById('grpRole').classList.add('hidden');
        document.getElementById('grpAuthors').classList.add('hidden');
        document.getElementById('grpQuartile').classList.add('hidden');
        document.getElementById('grpMonths').classList.add('hidden');

        if(act) {
            if(act.reqRole) document.getElementById('grpRole').classList.remove('hidden');
            if(act.reqAuthors) document.getElementById('grpAuthors').classList.remove('hidden');
            if(act.reqQuartile) document.getElementById('grpQuartile').classList.remove('hidden');
            if(act.reqMonths) document.getElementById('grpMonths').classList.remove('hidden');
        }
    }

    function addActivity() {
        const id = document.getElementById('selActivity').value;
        if(!id) return alert('Lütfen bir faaliyet türü seçin.');

        const act = activityData.find(a => a.id === id);
        
        const r_val = parseFloat(document.getElementById('selRole').value) || 1;
        const n_val = parseInt(document.getElementById('inpAuthors').value) || 1;
        const k_val = calculateK(n_val);
        const p_val = parseFloat(document.getElementById('selQuartile').value) || 1;
        const m_val = parseInt(document.getElementById('inpMonths').value) || 1;

        const rate = act.rateFunc(r_val, k_val, p_val, m_val);
        const catBasePoints = categoryMax[act.cat];
        const itemPoints = (rate / 100) * catBasePoints;

        let metaText = [];
        if(act.reqRole) metaText.push(r_val === 1 ? 'Yürütücü' : 'Araştırmacı');
        if(act.reqAuthors) metaText.push(`${n_val} Kişi`);
        if(act.reqQuartile) {
            if(p_val === 1) metaText.push('Q1');
            if(p_val === 0.8) metaText.push('Q2');
            if(p_val === 0.5) metaText.push('Q3/AHCI');
            if(p_val === 0.25) metaText.push('Q4');
        }
        if(act.reqMonths) metaText.push(`${m_val} Ay`);

        activities.push({
            id: Date.now().toString(),
            actId: act.id,
            cat: act.cat,
            title: act.label,
            meta: metaText.join(' • '),
            points: itemPoints
        });

        renderList();
        
        // Reset specific inputs silently
        document.getElementById('inpAuthors').value = 1;
        document.getElementById('inpMonths').value = 1;
    }

    function deleteActivity(id) {
        activities = activities.filter(a => a.id !== id);
        renderList();
    }

    function renderList() {
        const listEl = document.getElementById('activityList');
        listEl.innerHTML = '';

        if(activities.length === 0) {
            listEl.innerHTML = '<div style="color:var(--text-muted); font-size:13px; text-align:center; padding: 10px;">Henüz faaliyet eklenmedi.</div>';
        }

        activities.forEach(item => {
            const div = document.createElement('div');
            div.className = 'activity-item';
            div.innerHTML = `
                <div class="activity-details">
                    <div class="activity-title">${item.title}</div>
                    <div class="activity-meta">${catLabels[item.cat]} | ${item.meta}</div>
                </div>
                <div class="activity-score">
                    ${item.points.toFixed(1)}
                    <button class="delete-btn" onclick="deleteActivity('${item.id}')">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `;
            listEl.appendChild(div);
        });

        calculateOverall();
    }

    function calculateOverall() {
        let catTotals = { proje:0, arastirma:0, yayin:0, tasarim:0, patent:0, atif:0, teblig:0, odul:0 };
        
        activities.forEach(a => {
            catTotals[a.cat] += a.points;
        });

        let finalTotal = 0;
        let breakdownHTML = '';

        for(let key in catTotals) {
            let userVal = catTotals[key];
            if(userVal > 0) {
                let cappedVal = Math.min(userVal, categoryMax[key]);
                finalTotal += cappedVal;
                
                breakdownHTML += `
                    <div class="breakdown-item">
                        <span class="breakdown-cat">${catLabels[key]} (Maks ${categoryMax[key]})</span>
                        <span class="breakdown-val">${cappedVal.toFixed(1)} ${userVal > categoryMax[key] ? '(Sınırda)' : ''}</span>
                    </div>
                `;
            }
        }

        finalTotal = Math.min(100, finalTotal);

        const scoreEl = document.getElementById('totalScore');
        scoreEl.textContent = finalTotal.toFixed(1);
        
        if(finalTotal >= 100) {
            scoreEl.classList.add('cap');
        } else {
            scoreEl.classList.remove('cap');
        }

        document.getElementById('breakdownSection').innerHTML = breakdownHTML;
    }

    // Init state
    renderList();
</script>

</body>
</html>
